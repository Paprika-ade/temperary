<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trash Finder</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>
    <div class="app">
        <header class="header">
            <div>
                <p class="subtitle">성균관대학교 자연과학캠퍼스</p>
                <h1>쓰레기통 찾기</h1>
            </div>
            <button class="gps-btn" onclick="moveToMyLocation()">📍</button>
        </header>

        <main>
            <section id="map-page" class="page active">
                <div class="search-box">
                    <input type="text" placeholder="장소나 쓰레기통 검색" />
                    <button>검색</button>
                </div>

                <div id="map"></div>

                <div class="bottom-card">
                    <h2>가까운 쓰레기통</h2>
                    <div id="bin-list"></div>
                </div>
            </section>

            <section id="share-page" class="page">
                <h2>쓰레기통 위치 공유</h2>
                <p class="desc">사진과 위치 정보를 등록해 다른 사용자와 공유하세요.</p>

                <label class="photo-box">
                    📷
                    <span>사진 촬영 또는 업로드</span>
                    <input type="file" accept="image/*" capture="environment" hidden />
                </label>

                <input class="input" type="text" placeholder="쓰레기통 이름 예: 도서관 앞" />

                <select class="input">
                    <option>쓰레기통 종류 선택</option>
                    <option>일반쓰레기</option>
                    <option>분리수거</option>
                    <option>음식물쓰레기</option>
                </select>

                <select class="input">
                    <option>상태 선택</option>
                    <option>깨끗함</option>
                    <option>보통</option>
                    <option>가득 참</option>
                    <option>파손됨</option>
                </select>

                <button class="main-btn">현재 위치로 등록하기</button>
            </section>

            <section id="guide-page" class="page">
                <h2>분리수거 안내</h2>
                <p class="desc">버릴 물건을 검색하면 처리 방법을 알려줍니다.</p>

                <div class="guide-search">
                    <input id="guide-input" type="text" placeholder="예: 페트병, 종이컵, 배달용기" />
                    <button onclick="searchGuide()">검색</button>
                </div>

                <div id="guide-result" class="guide-result">
                    <h3>예시: 페트병</h3>
                    <p>내용물을 비우고 라벨을 제거한 뒤 압축해서 플라스틱류로 배출합니다.</p>
                </div>
            </section>
        </main>

        <nav class="tab-bar">
            <button class="tab active" onclick="showPage('map-page', this)">🗺️<span>지도</span></button>
            <button class="tab" onclick="showPage('share-page', this)">📸<span>공유</span></button>
            <button class="tab" onclick="showPage('guide-page', this)">♻️<span>안내</span></button>
        </nav>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>

</html>
